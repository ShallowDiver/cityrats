name: Deploy site

on:
  push:
    branches: [main]
  schedule:
    # Monthly data refresh on the 3rd, with a backstop run on the 5th in
    # case the first attempt hits a bad hour on GitHub's side. Both fetch
    # fresh data, so the redundancy is harmless. Odd minute to avoid the
    # top-of-hour crowd.
    - cron: "17 6 3 * *"
    - cron: "17 6 5 * *"
  workflow_dispatch:
    inputs:
      fresh_data:
        description: "Refetch data from NYC Open Data (~15 min) instead of reusing the live site's data"
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Fetching data (about 15 minutes) is separate from deploying so a failed
  # deploy can be retried from the Actions tab without refetching: the
  # artifact from this job survives the run.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Scheduled runs refetch everything from NYC Open Data (about 15
      # minutes, Python standard library only). If NYC Open Data is down,
      # the job fails and the previous deployment stays live. A manual run
      # with "fresh_data" checked does the same.
      - name: Fetch latest data
        if: github.event_name == 'schedule' || inputs.fresh_data
        run: |
          python3 pipeline/fetch_bait_data.py
          python3 pipeline/fetch_complaint_data.py

      # Display-only deploys (pushes, plain manual runs) skip the refetch
      # and reuse the data files the live site is already serving, so code
      # changes go out in about a minute. If the site has never deployed,
      # this fails; run the workflow manually with "fresh_data" instead.
      - name: Reuse live site data
        if: ${{ !(github.event_name == 'schedule' || inputs.fresh_data) }}
        run: |
          mkdir -p web/data
          base="https://shallowdiver.github.io/cityrats/data"
          curl -fsSL --retry 3 -o web/data/bait_grid.json "$base/bait_grid.json"
          curl -fsSL --retry 3 -o web/data/complaints_grid.json "$base/complaints_grid.json"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.retry.outputs.page_url }}
    steps:
      # Pages must be enabled once by hand first: repo Settings, Pages,
      # Source "GitHub Actions". The workflow token cannot do that itself.
      - uses: actions/configure-pages@v5

      # Pages deployments intermittently fail with a generic "try again
      # later" even when nothing is wrong with the artifact, so a failure
      # gets a second attempt after a pause before the run is declared dead.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - if: steps.deployment.outcome == 'failure'
        run: sleep 60

      - id: retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
